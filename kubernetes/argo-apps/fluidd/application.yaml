---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluidd
  namespace: argocd
spec:
  project: default
  destination:
    namespace: printer
    server: https://kubernetes.default.svc
  source:
    repoURL: https://bjw-s.github.io/helm-charts
    chart: app-template
    targetRevision: 3.1.0
    helm:
      valuesObject:
        controllers:
          main:
            containers:
              main:
                image:
                  repository: ghcr.io/fluidd-core/fluidd
                  tag: v1.31.2
        ingress:
          main:
            enabled: true
            annotations:
              traefik.ingress.kubernetes.io/router.middlewares: "admin-forwardauth-authelia@kubernetescrd"
            hosts:
              - host: "fluidd.${domain}"
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      identifier: main
        service:
          main:
            controller: main
            ports:
              http:
                port: 80
